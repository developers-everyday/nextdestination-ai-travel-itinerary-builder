<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="35%" r="65%" fx="38%" fy="35%">
      <stop offset="0%"  stop-color="#7c5cf5"/>
      <stop offset="45%" stop-color="#5b3fdb"/>
      <stop offset="100%" stop-color="#1e2a6e"/>
    </radialGradient>
    <radialGradient id="rimLight" cx="62%" cy="68%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </radialGradient>
    <linearGradient id="bagBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="50%" stop-color="rgba(230,225,255,0.88)"/>
      <stop offset="100%" stop-color="rgba(200,190,240,0.75)"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(210,200,245,0.85)"/>
    </linearGradient>
    <radialGradient id="bagShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(15,10,50,0.35)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="10" stdDeviation="10" flood-color="rgba(10,5,40,0.4)"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="252" fill="url(#sphere)"/>
  <circle cx="256" cy="256" r="252" fill="url(#rimLight)"/>
  <ellipse cx="195" cy="163" rx="93" ry="72" fill="rgba(255,255,255,0.13)"/>

  <g transform="translate(256,272)" filter="url(#dropShadow)">
    <ellipse cx="0" cy="104" rx="83" ry="16" fill="url(#bagShadow)"/>

    <path d="M-32,-98 L-32,-123 C-32,-149 -19,-165 0,-165 C19,-165 32,-149 32,-123 L32,-98"
          fill="none" stroke="url(#handleGrad)" stroke-width="14.5" stroke-linecap="round"/>
    <path d="M-21,-98 L-21,-120 C-21,-140 -10.5,-152 0,-152 C10.5,-152 21,-140 21,-120 L21,-98"
          fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>

    <rect x="-93" y="-98" width="186" height="165" rx="24" ry="24"
          fill="url(#bagBody)" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>

    <rect x="-93" y="-98" width="32" height="165" rx="20" ry="20"
          fill="rgba(120,100,180,0.15)"/>
    <rect x="-93" y="27" width="186" height="40" rx="0" ry="19"
          fill="rgba(100,80,160,0.1)"/>

    <line x1="0" y1="-98" x2="0" y2="67" stroke="rgba(140,120,200,0.5)" stroke-width="10"/>
    <line x1="3.2" y1="-98" x2="3.2" y2="67" stroke="rgba(255,255,255,0.4)" stroke-width="2.7"/>

    <rect x="-18.5" y="-26" width="37" height="37" rx="9" fill="white" filter="url(#glow)"/>
    <rect x="-13" y="-21" width="26" height="26" rx="6" fill="rgba(200,190,240,0.5)"/>
    <rect x="-10" y="-18" width="8" height="8" rx="2.5" fill="rgba(255,255,255,0.9)"/>

    <line x1="-83" y1="-96" x2="83" y2="-96"
          stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>

    <circle cx="-51" cy="82" r="14.5" fill="rgba(230,225,250,0.9)"/>
    <circle cx="-55" cy="78" r="5.3" fill="rgba(255,255,255,0.7)"/>
    <circle cx="51" cy="82" r="14.5" fill="rgba(230,225,250,0.9)"/>
    <circle cx="47" cy="78" r="5.3" fill="rgba(255,255,255,0.7)"/>
  </g>

  <ellipse cx="155" cy="123" rx="32" ry="21" fill="rgba(255,255,255,0.08)"
           transform="rotate(-25 155 123)"/>
</svg>
