<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="35%" r="65%" fx="38%" fy="35%">
      <stop offset="0%"  stop-color="#7c5cf5"/>
      <stop offset="45%" stop-color="#5b3fdb"/>
      <stop offset="100%" stop-color="#1e2a6e"/>
    </radialGradient>
    <radialGradient id="rimLight" cx="62%" cy="68%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </radialGradient>
    <linearGradient id="bagBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="50%" stop-color="rgba(230,225,255,0.88)"/>
      <stop offset="100%" stop-color="rgba(200,190,240,0.75)"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(210,200,245,0.85)"/>
    </linearGradient>
    <radialGradient id="bagShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(15,10,50,0.35)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(10,5,40,0.4)"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="96" cy="96" r="94" fill="url(#sphere)"/>
  <circle cx="96" cy="96" r="94" fill="url(#rimLight)"/>
  <ellipse cx="73" cy="61" rx="35" ry="27" fill="rgba(255,255,255,0.13)"/>

  <g transform="translate(96,102)" filter="url(#dropShadow)">
    <ellipse cx="0" cy="39" rx="31" ry="6" fill="url(#bagShadow)"/>

    <path d="M-12,-37 L-12,-46 C-12,-56 -7,-62 0,-62 C7,-62 12,-56 12,-46 L12,-37"
          fill="none" stroke="url(#handleGrad)" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M-8,-37 L-8,-45 C-8,-52.5 -4,-57 0,-57 C4,-57 8,-52.5 8,-45 L8,-37"
          fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

    <rect x="-35" y="-37" width="70" height="62" rx="9" ry="9"
          fill="url(#bagBody)" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>

    <rect x="-35" y="-37" width="12" height="62" rx="8" ry="8"
          fill="rgba(120,100,180,0.15)"/>
    <rect x="-35" y="10" width="70" height="15" rx="0" ry="7"
          fill="rgba(100,80,160,0.1)"/>

    <line x1="0" y1="-37" x2="0" y2="25" stroke="rgba(140,120,200,0.5)" stroke-width="3.8"/>
    <line x1="1.2" y1="-37" x2="1.2" y2="25" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

    <rect x="-7" y="-10" width="14" height="14" rx="3.5" fill="white" filter="url(#glow)"/>
    <rect x="-5" y="-8" width="10" height="10" rx="2.4" fill="rgba(200,190,240,0.5)"/>
    <rect x="-3.8" y="-6.8" width="3" height="3" rx="1" fill="rgba(255,255,255,0.9)"/>

    <line x1="-31" y1="-36" x2="31" y2="-36"
          stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-linecap="round"/>

    <circle cx="-19" cy="31" r="5.4" fill="rgba(230,225,250,0.9)"/>
    <circle cx="-20.5" cy="29.5" r="2" fill="rgba(255,255,255,0.7)"/>
    <circle cx="19" cy="31" r="5.4" fill="rgba(230,225,250,0.9)"/>
    <circle cx="17.5" cy="29.5" r="2" fill="rgba(255,255,255,0.7)"/>
  </g>

  <ellipse cx="58" cy="46" rx="12" ry="8" fill="rgba(255,255,255,0.08)"
           transform="rotate(-25 58 46)"/>
</svg>
