<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background sphere gradient -->
    <radialGradient id="sphere" cx="38%" cy="35%" r="65%" fx="38%" fy="35%">
      <stop offset="0%"  stop-color="#7c5cf5"/>
      <stop offset="45%" stop-color="#5b3fdb"/>
      <stop offset="100%" stop-color="#1e2a6e"/>
    </radialGradient>
    <!-- Subtle ring of light on sphere edge -->
    <radialGradient id="rimLight" cx="62%" cy="68%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </radialGradient>
    <!-- Bag body gradient for 3D depth -->
    <linearGradient id="bagBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="50%" stop-color="rgba(230,225,255,0.88)"/>
      <stop offset="100%" stop-color="rgba(200,190,240,0.75)"/>
    </linearGradient>
    <!-- Handle gradient -->
    <linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(210,200,245,0.85)"/>
    </linearGradient>
    <!-- Shadow under bag -->
    <radialGradient id="bagShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(15,10,50,0.35)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="rgba(10,5,40,0.4)"/>
    </filter>
    <!-- Soft glow on buckle -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 3D Sphere background -->
  <circle cx="50" cy="50" r="49" fill="url(#sphere)"/>
  <circle cx="50" cy="50" r="49" fill="url(#rimLight)"/>

  <!-- Specular highlight on sphere -->
  <ellipse cx="38" cy="32" rx="18" ry="14" fill="rgba(255,255,255,0.13)"/>

  <!-- Travel bag group with drop shadow -->
  <g transform="translate(50,53)" filter="url(#dropShadow)">
    <!-- Shadow ellipse under bag -->
    <ellipse cx="0" cy="20" rx="16" ry="3" fill="url(#bagShadow)"/>

    <!-- Handle -->
    <path d="M-6,-19 L-6,-24 C-6,-29 -3.5,-32 0,-32 C3.5,-32 6,-29 6,-24 L6,-19"
          fill="none" stroke="url(#handleGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Handle inner highlight -->
    <path d="M-4,-19 L-4,-23.5 C-4,-27 -2,-29.5 0,-29.5 C2,-29.5 4,-27 4,-23.5 L4,-19"
          fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Bag body (3D rounded rectangle) -->
    <rect x="-18" y="-19" width="36" height="32" rx="4.5" ry="4.5"
          fill="url(#bagBody)" stroke="rgba(255,255,255,0.6)" stroke-width="0.5"/>

    <!-- Left face shadow (perspective illusion) -->
    <rect x="-18" y="-19" width="6" height="32" rx="4" ry="4"
          fill="rgba(120,100,180,0.15)"/>

    <!-- Bottom face shadow -->
    <rect x="-18" y="5" width="36" height="8" rx="0" ry="4"
          fill="rgba(100,80,160,0.1)"/>

    <!-- Center strap -->
    <line x1="0" y1="-19" x2="0" y2="13" stroke="rgba(140,120,200,0.5)" stroke-width="2"/>
    <!-- Strap highlight -->
    <line x1="0.6" y1="-19" x2="0.6" y2="13" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>

    <!-- Center buckle (3D raised) -->
    <rect x="-3.5" y="-5" width="7" height="7" rx="1.8"
          fill="white" filter="url(#glow)"/>
    <rect x="-2.5" y="-4" width="5" height="5" rx="1.2"
          fill="rgba(200,190,240,0.5)"/>
    <rect x="-2" y="-3.5" width="1.5" height="1.5" rx="0.5"
          fill="rgba(255,255,255,0.9)"/>

    <!-- Top edge highlight -->
    <line x1="-16" y1="-18.5" x2="16" y2="-18.5"
          stroke="rgba(255,255,255,0.5)" stroke-width="0.5" stroke-linecap="round"/>

    <!-- Wheels (3D spheres) -->
    <circle cx="-10" cy="16" r="2.8" fill="rgba(230,225,250,0.9)"/>
    <circle cx="-10.8" cy="15.2" r="1" fill="rgba(255,255,255,0.7)"/>
    <circle cx="10" cy="16" r="2.8" fill="rgba(230,225,250,0.9)"/>
    <circle cx="9.2" cy="15.2" r="1" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Top-left specular flare -->
  <ellipse cx="30" cy="24" rx="6" ry="4" fill="rgba(255,255,255,0.08)"
           transform="rotate(-25 30 24)"/>
</svg>
